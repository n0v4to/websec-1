<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="calculator">
        <div class="inputs-row">
            <input type="text" id="num1" class="input-field" placeholder=" ">
            <select id="operation" class="operation-select">
                <option value="+" selected>+</option>
                <option value="-">−</option>
                <option value="*">×</option>
                <option value="/">÷</option>
            </select>
            <input type="text" id="num2" class="input-field" placeholder=" ">
        </div>

        <button class="calc-btn" id="calculateBtn">подсчитать</button>

        <div class="error-message" id="errorMessage"></div>

        <div class="result-area">
            <div class="history-list" id="historyList"></div>
            <div id="currentResult" class="current-result-field"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
